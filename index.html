<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title>Unity Stream</title>

    <script>
     const LOCAL_BASE = "http://10.48.80.207:8080";
  const VIEW_PATH = "/receiver/index.html";
  const TARGET_URL = LOCAL_BASE.replace(/\/+$/, "") + VIEW_PATH;
  window.location.replace(TARGET_URL);
    </script>

    <noscript>
      <!-- If JS is disabled, user can still tap the link below -->
      <meta http-equiv="refresh" content="0; url=http://10.48.80.207/receiver/index.html" />
    </noscript>

    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 0;
        padding: 28px;
        line-height: 1.4;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        width: min(640px, 92vw);
        border: 1px solid rgba(127,127,127,0.25);
        border-radius: 16px;
        padding: 18px 18px 14px;
      }
      h1 { font-size: 18px; margin: 0 0 10px; }
      p { margin: 10px 0; opacity: 0.9; }
      a {
        display: inline-block;
        font-size: 16px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(127,127,127,0.35);
        text-decoration: none;
      }
      a:active { transform: scale(0.99); }
      code { opacity: 0.8; word-break: break-all; }
      .tiny { font-size: 13px; opacity: 0.7; }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>Redirecting to the live Unity stream…</h1>
      <p>If you aren’t redirected automatically, tap:</p>
      <p><a id="link" href="#">Open the stream</a></p>
      <p class="tiny">Target: <code id="targetText"></code></p>
    </div>

    <script>
      const link = document.getElementById("link");
      const targetText = document.getElementById("targetText");

      link.href = TARGET_URL;
      targetText.textContent = TARGET_URL;
    </script>
  </body>
</html>
